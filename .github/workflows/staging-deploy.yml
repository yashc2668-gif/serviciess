name: Staging Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/staging-deploy.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    concurrency:
      group: staging-deploy
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_KEY }}

      - name: Add staging host to known hosts
        run: ssh-keyscan -H "${{ secrets.STAGING_HOST }}" >> ~/.ssh/known_hosts

      - name: Ensure staging target directory exists
        run: |
          ssh "${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}" "mkdir -p '${{ secrets.STAGING_TARGET_DIR }}/backend'"

      - name: Sync backend to staging host
        run: |
          rsync -az --delete \
            --filter='P .env.staging' \
            --filter='P uploads/' \
            --filter='P logs/' \
            backend/ "${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}:${{ secrets.STAGING_TARGET_DIR }}/backend/"

      - name: Deploy staging stack
        run: |
          ssh "${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}" "cd '${{ secrets.STAGING_TARGET_DIR }}/backend' && chmod +x docker/deploy-staging.sh && ./docker/deploy-staging.sh"
